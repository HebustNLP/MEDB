# Drop-in for nvidia-fabricmanager.service
# 确保 /var/run/nvidia-fabricmanager 存在且权限正确，解决：
# "fabric manager don't have access permissions to directory /var/run/nvidia-fabricmanager"
#
# 安装方法（需 sudo）：
#   sudo mkdir -p /etc/systemd/system/nvidia-fabricmanager.service.d
#   sudo cp /home/david/reproduce_MOGB1/nvidia-fabricmanager-ensure-dir.conf /etc/systemd/system/nvidia-fabricmanager.service.d/ensure-dir.conf
#   sudo systemctl daemon-reload
#   sudo systemctl start nvidia-fabricmanager.service
#
# 若仍失败，查看详细日志：sudo journalctl -xeu nvidia-fabricmanager.service -n 80 --no-pager

[Service]
# /var/run 指向 /run，此处由 systemd 在启动时创建并设好权限
RuntimeDirectory=nvidia-fabricmanager
RuntimeDirectoryMode=0755
